#:schema https://mise.jdx.dev/schema/mise.json

# mise 内蔵の brew バックエンドで導入するシステムパッケージ（Homebrew 本体は不要）
# 導入: mise bootstrap packages apply / 更新: mise bootstrap packages upgrade
[bootstrap.packages]
"brew:git" = "latest"

[tools]
bun = "latest"
fzf = "latest"
gh = "latest"
ghq = "latest"
lefthook = "latest"
node = "latest"
pnpm = "latest"
shfmt = "latest"
starship = "latest"
"npm:difit" = "latest"
rust = "latest"
helix = "latest"
yazi = "latest"
"github:trasta298/keifu" = "latest"
"github:laishulu/macism" = { version = "latest", os = ["macos"] }
"github:jfernandez/mdserve" = { version = "latest", bin = "mdserve" }
colima = "latest"
docker-cli = "latest"
lima = "latest"
gcloud = "latest"
docker-compose = "latest"
"github:k1LoW/mo" = "latest"
claude-code = "latest"
codex = "latest"
ni = "latest"
herdr = "latest"
"github:miyaoka/gozd" = { version = "latest", prerelease = "true", postinstall = '"$MISE_TOOL_INSTALL_PATH/bin/gozd" sync-app' }

[settings]
trusted_config_paths = [
  '~/ghq/github.com/miyaoka/',
  '~/ghq/github.com/studio-design/',
  '~/worktrees/github.com/miyaoka',
  '~/worktrees/github.com/studio-design/',
  '~/.local/share/gozd/',
]
idiomatic_version_file_enable_tools = []
minimum_release_age_excludes = ["claude-code", "github:miyaoka/gozd"]
